<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes Profile - MKT4X</title>    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">

    
</head>
<body>
  <div id="navbar-placeholder"></div>
  
  <div id="sidebar-placeholder"></div>
  
    <main class="content-main">
      
        <div class="member-card">
            <div class="member-img">
                <img src="https://i.imgur.com/9iiTqah.png" alt="AgnesMember Photo">
            </div>
            <div class="member-info">
                <h1 id="txt-member-name">AGNES</h1>
                <div class="badge-gen" id="txt-gen">Anggota Generasi ke-1 MKT4X</div>

                <div class="bio-table">
                    <div class="bio-row">
                        <span class="bio-label" id="lbl-birthday">Tanggal Lahir</span>
                        <span>8 Juni 1999</span>
                    </div>
                    <div class="bio-row">
                        <span class="bio-label" id="lbl-hometown">Asal</span>
                        <span>Bogor</span>
                    </div>
                    <div class="bio-row">
                        <span class="bio-label" id="lbl-blood">Gol. Darah</span>
                        <span>O</span>
                    </div>
                </div>

                <div class="member-footer">
                    <div class="catchphrase-box">
                        <i class="fas fa-quote-left"></i>
                        <p id="txt-phrase">"Dengan senyum manis dan semangat tanpa batas, aku siap membuat hari kalian lebih indah!"</p>
                    </div>
                    <div class="status-box">
                        <span id="lbl-status">Status:</span>
                        <span class="status-tag" id="txt-status">Aktif</span>
                    </div>
                </div>
            </div>
        </div>

</script>
