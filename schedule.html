<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - MKT4X</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="content-main">
        <h1 id="txt-main-title">SCHEDULE MKT4X</h1>
        
        <div class="calendar-card">
            <div class="calendar-header">
                <h2 id="monthYear"></h2>
                <div class="nav-btns">
                    <button onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button>
                    <button onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="days-grid" id="daysLabel">
                <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
            </div>
            <div class="dates-grid" id="datesGrid"></div>
        </div>

        <div class="info-card">
            <h4 id="infoTitle">Detail Jadwal</h4>
            <div id="eventDisplay">
                <p id="infoPlaceholder" style="color:#888; font-size:0.8rem;">Klik tanggal untuk melihat jadwal.</p>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
