<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - MKT4X Official</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="container section-spacing" style="margin-top: 80px;">
        <h2 class="title-center" id="schTitle">SCHEDULE MKT4X</h2>
        
        <div class="schedule-page-wrapper">
            <div id="calendar-mini" class="calendar-box">
                <div style="text-align: center; padding: 40px; color: #888;">
                    <i class="fas fa-spinner fa-spin"></i> Memuat Kalender...
                </div>
            </div>

            <div class="event-details-box">
                <h4 style="border-bottom: 2px solid var(--papermint); padding-bottom: 10px; margin-bottom: 15px;">
                    Detail Jadwal
                </h4>
                <div id="eventDisplay">
                    <div class="sch-item">
                        <span class="tag-pm">PM</span> 
                        <strong>8 Maret 2026</strong><br>
                        Kiara Birthday - Private Message Special AI
                    </div>
                    <div class="sch-item">
                        <span class="tag-theater">THEATER</span> 
                        <strong>15 Maret 2026</strong><br>
                        MKT4X 1st Stage: Pajama Drive
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
