<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - BNK48 Inspired</title>
<link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>
    
    <div class="container">
        <!-- Header with logo and social icons -->
        <header>
            <div class="logo">
                <img src="https://via.placeholder.com/150x50?text=BNK48+Style" alt="Logo">
            </div>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
                <a href="#"><i class="fab fa-tiktok"></i></a>
            </div>
        </header>

        <!-- Hero / Featured Image -->
        <section class="hero">
            <img src="https://via.placeholder.com/1200x400?text=BNK48+Banner" alt="Hero Banner">
        </section>

        <!-- News Section -->
        <section class="news">
            <div class="section-header">
                <h2>Berita</h2>
                <a href="#" class="view-all">Lihat semua</a>
            </div>
            <div class="news-list" id="news-list">
                <!-- News items will be injected by JS -->
            </div>
        </section>

        <!-- Schedule Section -->
        <section class="schedule">
            <div class="section-header">
                <h2>Jadwal</h2>
                <a href="#" class="view-all">Lihat semua</a>
            </div>
            <div class="schedule-list" id="schedule-list">
                <!-- Schedule items will be injected by JS -->
            </div>
        </section>

        <!-- Symbols / Icons Section (Social / Features) -->
        <section class="symbols">
            <div class="symbol-item">
                <i class="fas fa-music"></i>
                <span>Musik</span>
            </div>
            <div class="symbol-item">
                <i class="fas fa-calendar-alt"></i>
                <span>Event</span>
            </div>
            <div class="symbol-item">
                <i class="fas fa-star"></i>
                <span>Idol</span>
            </div>
            <div class="symbol-item">
                <i class="fas fa-heart"></i>
                <span>Fanclub</span>
            </div>
        </section>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
