<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kiara Profile - MKT4X</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- CSS External -->
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<!-- Navbar & Sidebar Loader -->
<div id="navbar-placeholder"></div>
<div id="sidebar-placeholder"></div>

<main class="content-main">
    
    <div class="member-card">

        <div class="member-img">
            <img src="https://i.imgur.com/KjU8YTn.png" alt="Kiara Member Photo">
        </div>

        <div class="member-info">

            <h1 id="txt-member-name">KIARA</h1>
            <div class="badge-gen" id="txt-gen">Anggota Generasi ke-1 MKT4X</div>

            <div class="bio-table">

                <div class="bio-row">
                    <span class="bio-label" id="lbl-birthday">Tanggal Lahir</span>
                    <span>1 Maret 2002</span>
                </div>

                <div class="bio-row">
                    <span class="bio-label" id="lbl-hometown">Asal</span>
                    <span>Surabaya</span>
                </div>

                <div class="bio-row">
                    <span class="bio-label" id="lbl-blood">Gol. Darah</span>
                    <span>B</span>
                </div>

            </div>

            <div class="member-footer">

                <div class="catchphrase-box">
                    <i class="fas fa-quote-left"></i>
                    <p id="txt-phrase">
                        "Seperti cahaya yang bersinar di langit malam, siap menerangi harimu!"
                    </p>
                </div>

                <div class="status-box">
                    <span id="lbl-status">Status:</span>
                    <span class="status-tag" id="txt-status">Aktif</span>
                </div>

            </div>

        </div>
    </div>

</main>


<!-- JS External -->
<script src="js/main.js"></script>

</body>
</html>
