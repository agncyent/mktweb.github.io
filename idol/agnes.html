<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes Profile - MKT4X</title>    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>
  
    <main class="content-main">
        <div class="member-card">
            <div class="member-img">
                <img src="https://i.imgur.com/9iiTqah.png" alt="Agnes Member Photo">
            </div>
            <div class="member-info">
                <h1>AGNES</h1>
                <div class="badge-gen">Anggota Generasi ke-1 MKT4X</div>
                <div class="bio-table">
                    <div class="bio-row"><span>Tanggal Lahir</span><span>8 Juni 1999</span></div>
                    <div class="bio-row"><span>Asal</span><span>Bogor</span></div>
                    <div class="bio-row"><span>Gol. Darah</span><span>O</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function loadComponent(id, path) {
            fetch(path)
                .then(response => {
                    if (!response.ok) throw new Error('Gagal ambil file: ' + path);
                    return response.text();
                })
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                })
                .catch(err => console.error(err));
        }

        // Kita panggil dengan ../ agar keluar dari folder idol
        loadComponent('navbar-placeholder', '../components/navbar.html');
        loadComponent('sidebar-placeholder', '../components/sidebar.html');
    </script>

    <script src="../js/main.js"></script>
</body>  
</html>
