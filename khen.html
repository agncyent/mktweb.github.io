 
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khen Profile - MKT4X</title>
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style2.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  
<div id="navbar-placeholder"></div>
  <div id="sidebar-placeholder"></div>
  
    <main class="content-main">
        <div class="member-card">
            <div class="member-img">
                <img src="https://i.imgur.com/EGuBLUf.png" alt="Khen Member Photo">
            </div>
            <div class="member-info">
                <h1 id="txt-member-name">KHEN</h1>
                <div class="badge-gen" id="txt-gen">Anggota Generasi ke-1 MKT4X</div>

                <div class="bio-table">
                    <div class="bio-row">
                        <span class="bio-label" id="lbl-birthday">Tanggal Lahir</span>
                        <span>24 Juli 2001</span>
                    </div>
                    <div class="bio-row">
                        <span class="bio-label" id="lbl-hometown">Asal</span>
                        <span>Jambi</span>
                    </div>
                    <div class="bio-row">
                        <span class="bio-label" id="lbl-blood">Gol. Darah</span>
                        <span>B</span>
                    </div>
                </div>

                <div class="member-footer">
                    <div class="catchphrase-box">
                        <i class="fas fa-quote-left"></i>
                        <p id="txt-phrase">"Energi penuh dan langkah penuh percaya diri! Siap mengguncang panggung bersama kalian!"</p>
                    </div>
                    <div class="status-box">
                        <span id="lbl-status">Status:</span>
                        <span class="status-tag" id="txt-status">Aktif</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
 
<div id="footer-placeholder"></div>
 
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/fanclub-register.js"></script>
<script src="js/main.js"></script>
<script src="js/footer.js"></script>
</body>  
</html>
