<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKT4X Official Website</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <section class="hero-container">
        <div class="slider">
            <img src="img/banner1.jpg" class="slide" alt="MKT4X Event">
            <img src="img/banner2.jpg" class="slide" style="display:none" alt="MKT4X Theater">
        </div>
    </section>

    <section class="container section-spacing">
        <h2 class="title-center" id="newsTitle">BERITA TERBARU</h2>
        <div class="news-list-home">
            <div class="news-row">
                <span class="news-date">8 Maret 2026</span>
                <span class="tag-pm">PM</span>
                <a href="#" class="news-link">Update Fitur Private Message AI Kiara MKT4X</a>
            </div>
            <div class="news-row">
                <span class="news-date">7 Maret 2026</span>
                <span class="tag-info">INFO</span>
                <a href="upgrade.html" class="news-link">Cara Upgrade ke Premium Membership MKT4X</a>
            </div>
        </div>
        <div style="text-align:center; margin-top:25px;">
            <a href="news.html" class="btn-check-all">Check All »</a>
        </div>
    </section>

    <section class="schedule-container" style="background: var(--papermint-soft); padding: 50px 0;">
        <div class="container">
            <h2 class="title-center" id="schTitle">SCHEDULE</h2>
            
            <div id="calendar-mini" class="calendar-card"></div>

            <div class="info-card">
                <h4 id="infoTitle">Detail Jadwal</h4>
                <div id="eventDisplay">
                    <p id="infoPlaceholder" style="color:#888; font-size:0.8rem;">Klik tanggal untuk melihat jadwal.</p>
                </div>
            </div>

            <div style="text-align:center; margin-top:30px;">
                <a href="schedule.html" class="btn-check-all">Check All »</a>
            </div>
        </div>
    </section>

    <section class="container section-spacing">
        <h2 class="title-center" id="bdayTitle">ULANG TAHUN</h2>
        <div class="birthday-card">
            <img src="img/members/kiara.jpg" alt="Kiara MKT4X">
            <div class="bday-info">
                <p style="color:#888; font-size:12px; margin-bottom:5px;">[MKT4X]</p>
                <h3 style="color:var(--papermint-dark); font-size:26px; margin-bottom:5px;">Kiara</h3>
                <p style="font-weight:700;">8 Maret 2010</p>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
