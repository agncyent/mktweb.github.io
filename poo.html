<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKT4X Official Website</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div id="navbar-placeholder"></div>
  <div id="sidebar-placeholder"></div>

<main class="container">

    </section>

    <section class="content-section">
        <div class="section-header">
            <h2 class="section-title">NEWS</h2>
            <a href="news/index.html" class="view-more">LIHAT SEMUA</a>
        </div>
        
        <div class="news-list">
            <div class="news-item">
                <div class="news-thumb">
                    <img src="thumb1.jpg" alt="Logo Baru">
                </div>
                <div class="news-info">
                    <span class="news-category">OFFICIAL NEWS</span>
                    <a href="news/logo.html" class="news-headline">Pergantian Logo Resmi MKT4X: Era Baru Dimulai</a>
                    <p class="news-date">09 Mar 2026</p>
                </div>
            </div>

            <div class="news-item">
                <div class="news-thumb"><img src="thumb2.jpg" alt="Event"></div>
                <div class="news-info">
                    <span class="news-category">EVENT</span>
                    <a href="news/event-pajama.html" class="news-headline">Performance Stage "Pajama Drive" - Kiara Center</a>
                    <p class="news-date">08 Mar 2026</p>
                </div>
            </div>
            </div>
    </section>

    <section class="content-section">
        <div class="section-header">
            <h2 class="section-title">SCHEDULE</h2>
            <a href="schedule/index.html" class="view-more">LIHAT SEMUA</a>
        </div>

        <div class="schedule-list">
            <div class="schedule-item">
                <div class="schedule-date">
                    <span class="date-num">10/03</span>
                    <span class="date-day">SEL/2026</span>
                </div>
                <div class="schedule-detail">
                    <a href="schedule/kiara-live.html" class="schedule-title">Kiara Digital Showroom Live</a>
                </div>
            </div>

            <div class="schedule-item">
                <div class="schedule-date">
                    <span class="date-num">12/03</span>
                    <span class="date-day">KAM/2026</span>
                </div>
                <div class="schedule-detail">
                    <a href="schedule/theater-reguler.html" class="schedule-title">MKT4X Theater: Aturan Anti Cinta</a>
                </div>
            </div>
            </div>
    </section>

  <script src="js/main.js"></script>
