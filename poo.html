<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKT4X Official Website</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <section class="hero-section">
        <div class="banner-container">
            <img src="img/banner1.jpg" class="main-banner" alt="MKT4X Banner">
        </div>
    </section>

    <section class="container section-margin">
        <div class="header-line">
            <h2 id="newsTitle">NEWS</h2>
            <a href="news.html" class="btn-more">VIEW MORE</a>
        </div>
        
        <div class="news-wrapper">
            <a href="#" class="news-item">
                <div class="news-thumb">
                    <img src="img/news/kiara-bday.jpg" alt="Kiara">
                </div>
                <div class="news-info">
                    <div class="meta-tags">
                        <span class="badge-pm">PM</span>
                        <span class="label-new">NEW!</span>
                    </div>
                    <span class="news-headline">Update Fitur Private Message AI Kiara MKT4X</span>
                    <span class="news-date">8 Mar 2026 | 14:00 WIB</span>
                </div>
            </a>
        </div>
    </section>

    <section class="container section-margin">
        <div class="header-line">
            <h2 id="schTitle">SCHEDULE</h2>
            <a href="schedule.html" class="btn-more">VIEW MORE</a>
        </div>

        <div class="sch-wrapper">
            <div class="sch-item">
                <div class="sch-date-box">
                    <span class="sch-day">10/03</span>
                    <span class="sch-year">TUE/2026</span>
                </div>
                <div class="sch-detail">
                    <p>Release Single "Akhirnya Bertemu"</p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
